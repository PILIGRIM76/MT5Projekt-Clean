name: System Monitoring Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Запуск каждый день в 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Ручной запуск

jobs:
  monitoring-tests:
    runs-on: windows-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-qt pytest-cov psutil
        pip install -r requirements.txt

    - name: Run System Monitor Tests
      run: |
        pytest tests/monitoring/test_system_monitor.py -v --log-cli-level=INFO --junitxml=reports/monitor-results.xml

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: monitoring-test-results-${{ matrix.python-version }}
        path: |
          reports/monitor-results.xml
          reports/monitor_*.log

    - name: Upload Error Reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: error-reports-${{ matrix.python-version }}
        path: reports/

  stress-test:
    runs-on: windows-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psutil
        pip install -r requirements.txt

    - name: Run Stress Test (2 minutes)
      run: |
        python tests/monitoring/stress_test.py --duration 120 --interval 0.1

    - name: Upload Stress Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stress-test-results
        path: reports/stress_*.log
