name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run tests
      run: |
        pytest tests/ -v --no-cov

    - name: Check critical tests pass
      run: |
        pytest tests/test_critical_safety.py tests/test_data_models.py -v --tb=short

  lint:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install linters
      run: |
        pip install flake8 black isort

    - name: Check code style with black
      run: black --check src/ tests/ || true

    - name: Check imports with isort
      run: isort --check-only src/ tests/ || true

    - name: Lint with flake8
      run: flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
