name: 🚀 Build Genesis Trading EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🐍 Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install wheel setuptools
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 🔨 Build EXE
      run: |
        pyinstaller GenesisTrading.spec --clean --noconfirm
      shell: cmd
      working-directory: .

    - name: 📁 Deploy files
      run: |
        call GenesisTrading_Build/deploy.bat
      shell: cmd
      working-directory: .
      continue-on-error: true

    - name: 📦 Create Portable ZIP
      run: |
        call GenesisTrading_Build/create_portable.bat
      shell: cmd
      working-directory: .
      continue-on-error: true

    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: GenesisTrading-v${{ github.ref_name }}
        path: |
          dist/GenesisTrading.exe
          dist/configs/
          dist/assets/
          dist/logs/
          dist/database/
          dist/README.md
          dist/QUICK_START.md
          dist/HOW_TO_RUN.md
        retention-days: 30

    - name: 📦 Upload Portable ZIP
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: GenesisTrading-Portable-v${{ github.ref_name }}
        path: GenesisTrading_Build/GenesisTrading_Portable_v*.zip
        retention-days: 30
        if-no-files-found: ignore

    - name: 🏷️ Create Release
      if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'
      uses: softprops/action-gh-release@v3
      with:
        name: Release ${{ github.ref_name }}
        body: |
          ## Genesis Trading System ${{ github.ref_name }}

          ### 📦 Автоматическая сборка

          **Дата:** ${{ github.event.head_commit.timestamp }}
          **Коммит:** ${{ github.sha }}

          ### 📝 Изменения:
          ${{ github.event.head_commit.message }}

          ### 📥 Файлы:
          - `GenesisTrading.exe` - Основной файл
          - `GenesisTrading_Portable_v*.zip` - Portable версия

          ### ⚙️ Установка:
          1. Скачайте EXE файл или Portable ZIP
          2. Распакуйте в любую папку
          3. Настройте `configs/settings.json`
          4. Запустите `GenesisTrading.exe`

          ---
          **Сборка создана автоматически через GitHub Actions**
        files: |
          dist/GenesisTrading.exe
          GenesisTrading_Build/GenesisTrading_Portable_v*.zip
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: ✅ Build completed
      run: |
        echo ============================================================
        echo   BUILD COMPLETED SUCCESSFULLY!
        echo ============================================================
        echo.
        echo Artifacts uploaded to GitHub Actions
        echo Release created: ${{ startsWith(github.ref, 'refs/tags/') }}
        echo.
      shell: cmd
