# pytest.ini - Конфигурация pytest для Genesis Trading System

[pytest]
# Пути поиска тестов
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Опции по умолчанию
addopts =
    -v
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=40
    -m "not e2e"

# Маркеры для категоризации тестов
markers =
    unit: Unit тесты (быстрые, изолированные)
    integration: Integration тесты (с БД и сервисами)
    e2e: End-to-End тесты (полный цикл)
    slow: Медленные тесты (> 1 секунды)
    mt5: Тесты требующие подключения к MT5
    db: Тесты требующие базу данных
    api: Тесты веб API

# Фильтры предупреждений
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Логирование
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(levelname)s - %(message)s
log_cli_date_format = %H:%M:%S
