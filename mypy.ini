# mypy.ini
# Configuration for mypy type checker

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
warn_unused_ignores = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
no_implicit_optional = True
strict_optional = True
ignore_missing_imports = True

files = src/core/services/, src/core/loop_manager.py, src/core/config_validator.py

exclude = (?x)(
    src/core/trading_system.py |
    src/gui/ |
    src/ml/
)

[mypy-src.core.services.*]
disallow_untyped_defs = True
check_untyped_defs = True

[mypy-src.core.loop_manager]
disallow_untyped_defs = True

[mypy-src.core.config_validator]
disallow_untyped_defs = True

[mypy-MetaTrader5.*]
ignore_missing_imports = True

[mypy-PySide6.*]
ignore_missing_imports = True

[mypy-pyqtgraph.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-stable_baselines3.*]
ignore_missing_imports = True

[mypy-optuna.*]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-lightgbm.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-faiss.*]
ignore_missing_imports = True

[mypy-neo4j.*]
ignore_missing_imports = True

[mypy-arch.*]
ignore_missing_imports = True
