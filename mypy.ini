# mypy.ini
# Configuration for mypy type checker

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
warn_unused_ignores = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
strict_optional = True
ignore_missing_imports = True

# Включаем строгую типизацию для всех модулей
files = src/

# Исключения для модулей с внешними зависимостями
exclude = (?x)(
    src/gui/components/charts.py |
    src/gui/components/backtest.py |
    src/ml/ |
    tests/
)

# Строгая типизация для core модулей
[mypy-src.core.*]
disallow_untyped_defs = True
check_untyped_defs = True

# Строгая типизация для GUI компонентов
[mypy-src.gui.components.models]
disallow_untyped_defs = True

[mypy-src.gui.components.bridges]
disallow_untyped_defs = True

# Исключения для внешних библиотек
[mypy-MetaTrader5.*]
ignore_missing_imports = True

[mypy-PySide6.*]
ignore_missing_imports = True

[mypy-pyqtgraph.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-stable_baselines3.*]
ignore_missing_imports = True

[mypy-optuna.*]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-lightgbm.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-faiss.*]
ignore_missing_imports = True

[mypy-neo4j.*]
ignore_missing_imports = True

[mypy-arch.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True
