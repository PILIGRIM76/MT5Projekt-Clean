# monitoring/prometheus.yml
# Конфигурация Prometheus для Genesis Trading System

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'genesis-trading'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # -------------------------------------------
  # Trading System Metrics
  # -------------------------------------------
  - job_name: 'trading-system'
    static_configs:
      - targets: ['trading-system:8080']
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 3s

  # -------------------------------------------
  # Prometheus Self-Monitoring
  # -------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # -------------------------------------------
  # Node Exporter (System Metrics)
  # -------------------------------------------
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # -------------------------------------------
  # Redis Exporter
  # -------------------------------------------
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # -------------------------------------------
  # PostgreSQL Exporter
  # -------------------------------------------
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
